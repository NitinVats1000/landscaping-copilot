services:
  db:
    image: postgres:16
    container_name: copilot-db
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot_dev_pw
      POSTGRES_DB: copilot
    ports:
      - "5432:5432"
    volumes:
      - copilot_pgdata:/var/lib/postgresql/data

volumes:
  copilot_pgdata: